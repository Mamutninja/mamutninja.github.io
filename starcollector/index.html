<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Collector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        
        <!-- LEFT COLUMN: BUILDINGS -->
        <div class="column-wrapper left-column">
            <h2 class="column-title">buildings</h2>
            <div class="scroll-container" id="buildings-container"></div>
        </div>

        <!-- CENTER AREA: LOCKED STAR -->
        <div class="center-area">
            <div class="star-system">
                <!-- The ring container is now a 0x0 point at the exact center of the star -->
                <div class="star-ring" id="star-ring"></div>
                
                <button id="main-star" class="star-btn">
                    <img src="images/star.png" alt="Star" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23FFF3CD\' stroke=\'%236A5257\' stroke-width=\'1\'><path d=\'M12 .587l3.668 7.431 8.2 1.192-5.934 5.785 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.133 9.21l8.2-1.192z\'/></svg>'">
                </button>
            </div>

            <div class="score-display">
                <div class="score-number" id="stardust-count">405</div>
                <div class="score-label">quadrillion<br>stardust</div>
            </div>
        </div>

        <!-- RIGHT COLUMN: UPGRADES -->
        <div class="column-wrapper right-column">
            <h2 class="column-title">upgrades</h2>
            <button class="scroll-arrow up-arrow" id="upgrade-up">▲</button>
            <div class="scroll-container" id="upgrades-container"></div>
            <button class="scroll-arrow down-arrow" id="upgrade-down">▼</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
