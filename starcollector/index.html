<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Clicker</title>
    <link rel="icon" type="image/x-icon" href="images/star.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        
        <h2 class="column-title" style="position: absolute; left: 318px; top: 50px;">buildings</h2>
        <h2 class="column-title" style="position: absolute; left: 775px; top: 50px;">upgrades</h2>

        <button id="main-star" class="star-btn">
            <img src="images/star.png" alt="Star" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23FFF3CD\' stroke=\'%236A5257\' stroke-width=\'1\'><path d=\'M12 .587l3.668 7.431 8.2 1.192-5.934 5.785 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.133 9.21l8.2-1.192z\'/></svg>'">
        </button>
        
        <div class="score-display">
            <div class="score-number" id="stardust-count" >405</div>
            <div class="score-label">quadrillion<br>stardust</div>
        </div>

       <button class="item-card" style="top: 120px; left: 203px;">
            <img src="images/paws.png" class="card-icon" alt="Paw">
            <span class="card-text">102 kitten paws</span>
        </button>

        <button class="item-card" style="top: 196px; left: 140px;">
            <img src="images/prisms.png" class="card-icon" alt="Prism">
            <span class="card-text">73 prisms</span>
        </button>

        <button class="item-card" style="top: 272px; left: 92px;">
            <img src="images/observatory.png" class="card-icon" alt="Paw">
            <span class="card-text">68 observatories</span>
        </button>

        <button class="item-card" style="top: 356px; left: 73px;">
            <img src="images/plasma_siphon.png" class="card-icon" alt="Plasma siphon">
            <span class="card-text">56 plasma siphons</span>
        </button>

        <button class="item-card" style="top: 440px; left: 92px;">
            <img src="images/black_hole.png" class="card-icon" alt="Black hole">
            <span class="card-text">37 black holes</span>
        </button>

        <button class="item-card" style="top: 524px; left: 126px;">
            <img src="images/wormhole.png" class="card-icon" alt="Wormhole">
            <span class="card-text">23 wormholes</span>
        </button>

        <button class="item-card" style="top: 608px; left: 203px;">
            <img src="images/multiverse.png" class="card-icon" alt="Multiverse">
            <span class="card-text">7 multiverses</span>
        </button>


    <!-- Script loaded at the bottom so the DOM elements exist before execution -->
    <script src="script.js"></script>
</body>
</html>
